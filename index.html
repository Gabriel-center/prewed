<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Amanda & Gabriel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  :root{--wa-bg:#ECE5DD;--wa-header:#075E54;--wa-green:#D9FDD3;--wa-white:#FFF;--wa-text:#111B21;--wa-time:#667781;--wa-call-green:#00A884}
  html,body{height:100%;overflow:hidden;touch-action:manipulation}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F5F0EB;-webkit-font-smoothing:antialiased}

  /* ========== ENVELOPE INTRO ========== */
  .envelope-intro{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:linear-gradient(160deg,#F5F0EB 0%,#EDE6DD 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s ease}
  .envelope-intro.hidden{opacity:0;pointer-events:none}
  .envelope-wrapper{position:relative;cursor:pointer;-webkit-user-select:none;user-select:none;animation:envelopeFall 1.2s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}
  @keyframes envelopeFall{0%{opacity:0;transform:translateY(-120vh) rotate(-8deg)}60%{opacity:1;transform:translateY(10px) rotate(2deg)}80%{transform:translateY(-5px) rotate(-1deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
  .envelope-svg{width:260px;height:auto;filter:drop-shadow(0 8px 30px rgba(0,0,0,.12))}
  .tap-hint{margin-top:28px;font-size:13px;color:#A09080;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;opacity:0;animation:hintIn .6s ease 1.4s forwards}
  @keyframes hintIn{from{opacity:0;transform:translateY(8px)}to{opacity:.7;transform:translateY(0)}}
  .envelope-wrapper.opening{animation:envelopeOpen 1.4s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes envelopeOpen{0%{transform:scale(1) translateY(0);opacity:1}30%{transform:scale(1.05) translateY(-10px);opacity:1}100%{transform:scale(14) translateY(0);opacity:0}}

  /* ========== PHONE FRAME ========== */
  .phone-frame{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--wa-bg);position:relative;overflow:hidden;opacity:0;transition:opacity .5s ease}
  .phone-frame.active{opacity:1}
  .phone-frame::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8bfb6' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:.5;z-index:0;pointer-events:none}

  .wa-header{background:var(--wa-header);padding:10px;display:flex;align-items:center;gap:10px;z-index:10;flex-shrink:0}
  .wa-back svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
  .wa-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#89CFF0,#6BA8D4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:#fff;font-weight:600;overflow:hidden}
  .wa-avatar img{width:100%;height:100%;object-fit:cover}
  .wa-contact-info{flex:1;min-width:0}
  .wa-contact-name{color:#fff;font-size:16.5px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wa-contact-status{color:rgba(255,255,255,.75);font-size:12.5px;margin-top:1px}
  .wa-header-icons{display:flex;gap:16px;flex-shrink:0}
  .wa-header-icons svg{width:22px;height:22px;fill:#fff}

  .wa-chat{flex:1;overflow-y:auto;padding:6px 14px 8px;display:flex;flex-direction:column;gap:2px;z-index:1;position:relative;scroll-behavior:smooth}
  .date-chip{align-self:center;background:rgba(255,255,255,.92);padding:6px 16px;border-radius:8px;font-size:12.5px;color:var(--wa-time);margin:6px 0 8px;box-shadow:0 1px 1px rgba(0,0,0,.06);opacity:0;transform:scale(.92);transition:opacity .3s,transform .3s}
  .date-chip.visible{opacity:1;transform:scale(1)}
  .msg{max-width:80%;padding:7px 9px 7px 10px;border-radius:8px;font-size:15.5px;line-height:1.42;color:var(--wa-text);position:relative;opacity:0;transform:translateY(8px) scale(.97);transition:opacity .22s ease,transform .22s ease;word-wrap:break-word}
  .msg.visible{opacity:1;transform:translateY(0) scale(1)}
  .msg-in{align-self:flex-start;background:var(--wa-white);border-top-left-radius:0}
  .msg-out{align-self:flex-end;background:var(--wa-green);border-top-right-radius:0}
  .msg-text{margin-right:56px}
  .msg-meta{float:right;margin-top:2px;display:flex;align-items:center;gap:3px;position:relative;top:4px}
  .msg-time{font-size:11px;color:var(--wa-time)}
  .msg-check{width:19px;height:13px;display:inline-block}
  .msg-check svg{width:19px;height:13px;display:block}
  .msg-call{max-width:75%;align-self:flex-start;background:var(--wa-white);border-radius:8px;border-top-left-radius:0;padding:9px 12px;display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(8px);transition:opacity .22s,transform .22s;font-size:14px;color:var(--wa-text)}
  .msg-call.visible{opacity:1;transform:translateY(0)}
  .call-icon{width:18px;height:18px;flex-shrink:0}
  .call-info{flex:1}
  .call-label{font-size:14.5px;color:var(--wa-text)}
  .call-duration{font-size:12.5px;color:var(--wa-time);margin-top:1px}
  .call-time-meta{font-size:11px;color:var(--wa-time);align-self:flex-end;margin-bottom:2px;flex-shrink:0}
  .typing-indicator{max-width:70px;border-radius:8px;border-top-left-radius:0;background:var(--wa-white);padding:12px 16px;display:none;gap:4px;align-items:center;align-self:flex-start}
  .typing-indicator.out{align-self:flex-end;background:var(--wa-green);border-radius:8px;border-top-right-radius:0;border-top-left-radius:8px}
  .typing-indicator.show{display:flex}
  .typing-dot{width:7px;height:7px;border-radius:50%;background:#9E9E9E;animation:typB 1.2s ease-in-out infinite}
  .typing-dot:nth-child(2){animation-delay:.15s}
  .typing-dot:nth-child(3){animation-delay:.3s}
  @keyframes typB{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
  .wa-input-bar{padding:4px 6px 6px;display:flex;align-items:flex-end;gap:5px;z-index:10;flex-shrink:0;background:var(--wa-bg)}
  .wa-input-field{flex:1;background:var(--wa-white);border-radius:24px;padding:10px 14px;font-size:15px;color:#999;display:flex;align-items:center;gap:8px}
  .wa-input-field svg{width:22px;height:22px;fill:#9E9E9E;flex-shrink:0}
  .wa-input-text{flex:1}
  .wa-mic-btn{width:44px;height:44px;border-radius:50%;background:var(--wa-header);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .wa-mic-btn svg{width:22px;height:22px;fill:#fff}

  /* ========== CALL SCREEN ========== */
  .call-screen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:linear-gradient(170deg,#075E54 0%,#054C44 40%,#022e28 100%);display:flex;flex-direction:column;align-items:center;padding-top:22vh;opacity:0;pointer-events:none;transition:opacity .4s ease;color:#fff;overflow:hidden}
  .call-screen.active{opacity:1;pointer-events:auto}
  .call-avatar-large{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#89CFF0,#6BA8D4);display:flex;align-items:center;justify-content:center;font-size:44px;color:#fff;font-weight:300;margin-bottom:22px;font-family:'Cormorant Garamond',Georgia,serif;overflow:hidden;box-shadow:0 0 80px rgba(137,207,240,.15)}
  .call-avatar-large img{width:100%;height:100%;object-fit:cover}
  .call-name-large{font-size:28px;font-weight:500;letter-spacing:-.3px;margin-bottom:8px}
  .call-status-text{font-size:15px;color:rgba(255,255,255,.6)}
  .call-swipe-area{position:absolute;bottom:70px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
  .swipe-btn{width:64px;height:64px;border-radius:50%;background:var(--wa-call-green);display:flex;align-items:center;justify-content:center;animation:swipePulse 2s ease-in-out infinite;box-shadow:0 4px 30px rgba(0,168,132,.4);transition:transform .4s,opacity .4s}
  .swipe-btn svg{width:30px;height:30px;fill:#fff}
  .swipe-text{font-size:14px;color:rgba(255,255,255,.45);letter-spacing:.3px;animation:swipeTextPulse 2s ease-in-out infinite}
  .swipe-arrows{display:flex;flex-direction:column;align-items:center}
  .swipe-arrows svg{width:20px;height:20px;stroke:rgba(255,255,255,.25);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .swipe-arrows svg:first-child{opacity:.35}
  @keyframes swipePulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes swipeTextPulse{0%,100%{opacity:.45}50%{opacity:.75}}
  .fade-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:300;opacity:0;pointer-events:none;transition:opacity .8s ease}
  .fade-overlay.active{opacity:1;pointer-events:auto}

  /* ========== FINAL REVEAL ========== */
  .final-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:400;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:opacity .5s ease;overflow-y:auto}
  .final-overlay.active{opacity:1;pointer-events:auto}
  .final-scene{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:100%;padding:40px 0}
  .final-envelope-wrap{z-index:5;transform:translateX(110vw);transition:transform .9s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 8px 30px rgba(0,0,0,.15));cursor:pointer}
  .final-overlay.active .final-envelope-wrap{transform:translateX(0)}
  .final-envelope-wrap.away{transform:translateX(110vw)!important;transition:transform .7s cubic-bezier(.6,0,.4,1)!important}
  .final-envelope-svg{width:280px;height:auto}
  .final-tap-hint{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:16px;text-align:center;opacity:0;animation:hintIn .6s ease .8s forwards;font-weight:500}

  .final-card-area{display:none;flex-direction:column;align-items:center;gap:20px}
  .final-card-area.show{display:flex;position:relative;z-index:20}

  .final-card-wrapper{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform 1s cubic-bezier(.22,1,.36,1)}
  .final-card-wrapper.reveal{opacity:1;transform:translateY(0)}

  /* ========== CARD ========== */
  .std-card{position:relative;width:320px;max-width:88vw;border-radius:6px;padding:52px 36px 46px;text-align:center;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.2)}
  .std-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:#FDFBF8;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");z-index:0}
  .wc-blob{position:absolute;border-radius:50%;z-index:1;opacity:0}
  .final-card-wrapper.reveal .wc-blob{animation:wcSpread 3.5s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes wcSpread{0%{transform:scale(.05);opacity:0;filter:blur(3px)}20%{opacity:.8}60%{filter:blur(14px)}100%{transform:scale(1);opacity:1;filter:blur(20px)}}
  .wc-blob-1{width:200px;height:170px;top:-40px;right:-50px;background:radial-gradient(ellipse at 40% 50%,rgba(137,207,240,.36) 0%,rgba(137,207,240,.1) 45%,transparent 68%);animation-delay:.3s}
  .wc-blob-2{width:160px;height:140px;bottom:-30px;left:-40px;background:radial-gradient(ellipse at 60% 40%,rgba(107,168,212,.3) 0%,rgba(107,168,212,.08) 45%,transparent 68%);animation-delay:.7s}
  .wc-blob-3{width:100px;height:90px;top:38%;left:-15px;background:radial-gradient(ellipse,rgba(173,216,230,.3) 0%,transparent 70%);animation-delay:1s}
  .wc-blob-4{width:80px;height:85px;top:18%;right:8px;background:radial-gradient(ellipse,rgba(135,206,250,.25) 0%,transparent 62%);animation-delay:1.2s}
  .wc-blob-5{width:120px;height:110px;bottom:22%;right:-30px;background:radial-gradient(ellipse,rgba(100,149,237,.2) 0%,transparent 62%);animation-delay:1.5s}
  .wc-blob-6{width:60px;height:55px;top:10%;left:22%;background:radial-gradient(ellipse,rgba(176,224,230,.35) 0%,transparent 62%);animation-delay:.5s}
  .wc-blob-7{width:70px;height:75px;bottom:8%;right:28%;background:radial-gradient(ellipse,rgba(137,207,240,.22) 0%,transparent 62%);animation-delay:1.8s}
  .wc-drip{position:absolute;z-index:1;opacity:0}
  .final-card-wrapper.reveal .wc-drip{animation:wcDrip 2.8s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes wcDrip{0%{opacity:0;transform:scaleY(.2)}35%{opacity:.6}100%{opacity:.8;transform:scaleY(1)}}
  .wc-drip-1{top:0;right:28px;width:3px;height:40px;background:linear-gradient(to bottom,rgba(137,207,240,.35),transparent);border-radius:0 0 3px 3px;filter:blur(2px);animation-delay:2s}
  .wc-drip-2{top:0;right:58px;width:2px;height:25px;background:linear-gradient(to bottom,rgba(107,168,212,.28),transparent);border-radius:0 0 2px 2px;filter:blur(1.5px);animation-delay:2.2s}
  .wc-drip-3{bottom:0;left:38px;width:2.5px;height:32px;background:linear-gradient(to top,rgba(137,207,240,.28),transparent);border-radius:3px 3px 0 0;filter:blur(2px);animation-delay:2.4s}
  .wc-drip-4{bottom:0;left:65px;width:2px;height:18px;background:linear-gradient(to top,rgba(100,149,237,.2),transparent);border-radius:2px 2px 0 0;filter:blur(1.5px);animation-delay:2.6s}
  .std-content{position:relative;z-index:2}
  .std-eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#5A9ABF;margin-bottom:28px;font-weight:600;opacity:0}
  .final-card-wrapper.reveal .std-eyebrow{animation:stdIn .8s ease forwards .6s}
  .std-names{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:400;color:#2A3A4A;letter-spacing:0;line-height:1.3;opacity:0}
  .final-card-wrapper.reveal .std-names{animation:stdIn .8s ease forwards .8s}
  .std-ampersand{display:block;font-size:22px;color:#6BA8D4;margin:6px 0;font-style:italic;font-weight:300}
  .std-line{width:50px;height:1.5px;background:linear-gradient(90deg,transparent,#89CFF0,transparent);margin:28px auto;opacity:0}
  .final-card-wrapper.reveal .std-line{animation:stdIn .8s ease forwards 1s}
  .std-date{font-family:'Inter',sans-serif;font-size:16px;letter-spacing:3.5px;text-transform:uppercase;color:#3A5A6E;margin-bottom:10px;font-weight:600;opacity:0}
  .final-card-wrapper.reveal .std-date{animation:stdIn .8s ease forwards 1.2s}
  .std-city{font-family:'Inter',sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:#6B8EA0;font-weight:500;opacity:0}
  .final-card-wrapper.reveal .std-city{animation:stdIn .8s ease forwards 1.4s}
  .std-years{font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;color:#7EA8BF;margin-top:30px;font-style:italic;font-weight:400;letter-spacing:.5px;opacity:0}
  .final-card-wrapper.reveal .std-years{animation:stdIn .8s ease forwards 1.6s}
  .std-footer{font-family:'Inter',sans-serif;margin-top:28px;font-size:11px;color:#93B3C5;letter-spacing:1.8px;text-transform:uppercase;font-weight:500;opacity:0;line-height:1.7}
  .final-card-wrapper.reveal .std-footer{animation:stdIn .8s ease forwards 1.8s}
  @keyframes stdIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ========== ACTION BUTTONS ========== */
  .action-buttons{display:flex;gap:12px;opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s ease;margin-top:4px}
  .action-buttons.show{opacity:1;transform:translateY(0)}
  .action-btn{
    display:flex;align-items:center;gap:8px;
    padding:13px 20px;border-radius:50px;border:none;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
    letter-spacing:.5px;transition:transform .2s,box-shadow .2s;
    -webkit-user-select:none;user-select:none;
  }
  .action-btn:active{transform:scale(.96)}
  .action-btn svg{width:18px;height:18px;flex-shrink:0}
  .btn-calendar{background:#3A6B8E;color:#fff;box-shadow:0 4px 16px rgba(58,107,142,.35)}
  .btn-calendar:hover{box-shadow:0 6px 20px rgba(58,107,142,.5)}
  .btn-download{background:#fff;color:#3A6B8E;box-shadow:0 4px 16px rgba(0,0,0,.1);border:1.5px solid #C8DDE8}
  .btn-download:hover{box-shadow:0 6px 20px rgba(0,0,0,.15)}

  @media(min-width:431px){.phone-frame{border-left:1px solid #ccc;border-right:1px solid #ccc}}
  @supports(padding-bottom:env(safe-area-inset-bottom)){.wa-input-bar{padding-bottom:calc(6px + env(safe-area-inset-bottom))}}

  /* ========== CAPTURE STATE (html2canvas) ========== */
  .std-card.capturing .wc-blob{opacity:1!important;transform:scale(1)!important;filter:blur(20px)!important;animation:none!important}
  .std-card.capturing .wc-drip{opacity:.8!important;transform:scaleY(1)!important;animation:none!important}
  .std-card.capturing .std-eyebrow,
  .std-card.capturing .std-names,
  .std-card.capturing .std-line,
  .std-card.capturing .std-date,
  .std-card.capturing .std-city,
  .std-card.capturing .std-years,
  .std-card.capturing .std-footer{opacity:1!important;transform:translateY(0)!important;animation:none!important}
</style>
</head>
<body>

<!-- Music -->
<audio id="bgMusic" preload="auto"><source src="musica.mp3" type="audio/mpeg"></audio>

<!-- ========== ENVELOPE INTRO ========== -->
<div class="envelope-intro" id="introScreen">
  <div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnvelope()">
    <svg class="envelope-svg" viewBox="0 0 260 190" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="40" width="250" height="145" rx="6" fill="#F8F1E8" stroke="#D4C4A8" stroke-width="1.5"/>
      <path d="M5 185 L130 120 L255 185" stroke="#E8DBC8" stroke-width="0.7" fill="none"/>
      <path d="M5 40 L255 40 L130 130 Z" fill="#EDE5D8" stroke="#D4C4A8" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M15 45 L130 122 L245 45" stroke="#DDD2C0" stroke-width="0.5" fill="none" opacity="0.6"/>
      <circle cx="130" cy="100" r="28" fill="#1A3A7A"/><circle cx="130" cy="100" r="25" fill="#24488E"/>
      <circle cx="130" cy="100" r="22" fill="none" stroke="#152E65" stroke-width="0.8" opacity="0.5"/>
      <circle cx="130" cy="100" r="18" fill="none" stroke="#6080B8" stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="122" cy="93" rx="9" ry="5" fill="#3568B2" opacity="0.35"/>
      <text x="130" y="96" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13" font-weight="600" fill="#D0DFEF" letter-spacing="0.5">A</text>
      <text x="130" y="104" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="8" font-style="italic" fill="#A0BFE0" letter-spacing="0.5">&amp;</text>
      <text x="130" y="113" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13" font-weight="600" fill="#D0DFEF" letter-spacing="0.5">G</text>
      <ellipse cx="111" cy="118" rx="4" ry="7" fill="#24488E"/><ellipse cx="151" cy="116" rx="3" ry="5" fill="#24488E"/><ellipse cx="115" cy="82" rx="3" ry="4" fill="#24488E"/>
    </svg>
  </div>
  <div class="tap-hint">Toque para abrir</div>
</div>

<!-- ========== CHAT ========== -->
<div class="phone-frame" id="phoneFrame">
  <div class="wa-header">
    <div class="wa-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="wa-avatar"><img src="foto.jpg" alt="A" onerror="this.style.display='none';this.parentElement.textContent='A'"></div>
    <div class="wa-contact-info"><div class="wa-contact-name">Amanda ❤️</div><div class="wa-contact-status">online</div></div>

<script>
// ===== AUDIO ENGINE =====
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function playTone(f,d,v,t){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v||.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}catch(e){}}
function soundMsgIn(){playTone(860,.08,.1);setTimeout(function(){playTone(1100,.07,.08)},60)}
function soundMsgOut(){playTone(600,.06,.06);setTimeout(function(){playTone(780,.06,.05)},50)}
var ringInterval=null;
function soundRingStart(){function r(){playTone(440,.15,.1);setTimeout(function(){playTone(580,.15,.1)},160);setTimeout(function(){playTone(440,.15,.1)},320);setTimeout(function(){playTone(580,.15,.1)},480)}r();ringInterval=setInterval(r,2e3)}
function soundRingStop(){if(ringInterval){clearInterval(ringInterval);ringInterval=null}}
function soundAnswer(){playTone(520,.12,.08);setTimeout(function(){playTone(660,.15,.06)},100)}
function soundSeal(){playTone(250,.25,.07);setTimeout(function(){playTone(350,.2,.05)},100)}
function soundReveal(){playTone(523,.3,.07);setTimeout(function(){playTone(659,.3,.06)},200);setTimeout(function(){playTone(784,.5,.06)},400)}

// ===== INTRO ENVELOPE =====
var started=false;
function openEnvelope(){
  if(started)return;started=true;
  initAudio();soundSeal();
  // Play music
  try{var m=document.getElementById('bgMusic');m.load();m.currentTime=0;var p=m.play();if(p!==undefined)p.catch(function(){})}catch(e){}
  document.getElementById('envelopeWrapper').classList.add('opening');
  setTimeout(function(){
    document.getElementById('introScreen').classList.add('hidden');
    document.body.style.background='#DAD3CC';
    document.getElementById('phoneFrame').classList.add('active');
    setTimeout(function(){document.getElementById('introScreen').style.display='none';play()},300);
  },1e3);
}

// ===== CHAT ENGINE =====
var chat=document.getElementById('chat'),typingIn=document.getElementById('typingIn'),typingOut=document.getElementById('typingOut');
var blueChecks='<svg viewBox="0 0 20 13" width="19" height="13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6.5L6.5 11L14 3.5" stroke="#53BDEB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5L10.5 11L18 3.5" stroke="#53BDEB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var greenPhone='<svg viewBox="0 0 24 24" width="18" height="18"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" fill="#00A884"/></svg>';

var script=[
  {from:'in',text:'moo',time:'16:48'},{from:'in',text:'posso te ligar?',time:'16:48',delay:900},
  {from:'out',text:'Uia, pra quê?',time:'16:50',delay:2400},
  {from:'in',text:'pra acertar os detalhes do casamento hehehe',time:'16:50',delay:2200},
  {from:'out',text:'Tá ansiosa né kkkk',time:'16:51',delay:2400},
  {from:'in',text:'é que a gnt vai casar',time:'16:52',delay:2e3},
  {from:'in',text:'a gnt vai casar de verdade 🥹',time:'16:52',delay:1e3},
  {from:'out',text:'A gente vai casar de verdade ❤️',time:'16:53',delay:3e3},
  {from:'in',text:'siim, depois de 8 anos de história',time:'16:55',delay:2600},
  {from:'out',text:'Tanta coisa pra resolver',time:'17:01',delay:3e3},
  {from:'in',text:'pois é, tanta gnt pra convidar',time:'17:01',delay:1800},
  {from:'out',text:'Ok ok, me liga',time:'17:01',delay:2e3},
  {from:'in',text:'ta bao',time:'17:02',delay:1200},
  {type:'call',delay:1800},
  {from:'out',text:'Certo, então o dia é 12 de setembro',time:'21:38',delay:1800},
  {from:'in',text:'issoo, a cerimônia vai ser aqui em Hortolândia, onde tudo começou',time:'21:39',delay:2400},
  {from:'out',text:'E a lista de convidados já está feita!',time:'21:40',delay:2400},
  {from:'in',text:'agora só avisar pra todo mundo!',time:'21:42',delay:2600},
  {from:'out',text:'Já tô cuidando disso 😉',time:'21:44',delay:2600},
  {from:'in',text:'Te amo boboca',time:'21:45',delay:2600},
  {from:'out',text:'Eu te amo mais ❤️😌',time:'21:45',delay:2400},
  {type:'savethedate',delay:2800}
];

function createMsg(m){var d=document.createElement('div');d.className='msg msg-'+m.from;var o=m.from==='out';d.innerHTML='<span class="msg-text">'+m.text+'</span><span class="msg-meta"><span class="msg-time">'+m.time+'</span>'+(o?'<span class="msg-check">'+blueChecks+'</span>':'')+'</span>';return d}
function createCallLog(){var d=document.createElement('div');d.className='msg-call';d.innerHTML='<div class="call-icon">'+greenPhone+'</div><div class="call-info"><div class="call-label">Ligação de voz</div><div class="call-duration">4h 36min</div></div><div class="call-time-meta">17:02</div>';return d}
function showTyping(f){var e=f==='in'?typingIn:typingOut;chat.appendChild(e);e.classList.add('show');scrollB()}
function hideTyping(f){(f==='in'?typingIn:typingOut).classList.remove('show')}
function scrollB(){chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'})}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

function showCallScreen(){
  return new Promise(function(resolve){
    var s=document.getElementById('callScreen'),b=document.getElementById('swipeBtn'),a=document.getElementById('swipeArea');
    s.classList.add('active');soundRingStart();
    function h(e){e.preventDefault();a.removeEventListener('click',h);a.removeEventListener('touchend',h);
      soundRingStop();soundAnswer();b.style.cssText='transform:translateY(-100px) scale(1.15);opacity:0;transition:all .4s ease';
      setTimeout(function(){var f=document.getElementById('fadeOverlay');f.classList.add('active');
        setTimeout(function(){s.classList.remove('active');b.style.cssText='';
          setTimeout(function(){f.classList.remove('active');resolve()},900)},1400)},500)}
    a.addEventListener('click',h);a.addEventListener('touchend',h)})
}

// ===== FINAL REVEAL (click to open) =====
var finalOpened=false;
function showFinalReveal(){
  var overlay=document.getElementById('finalOverlay');
  var envWrap=document.getElementById('finalEnvelopeWrap');

  soundReveal();
  overlay.classList.add('active');

  // Wait for click on the envelope
  function handleFinalClick(e){
    if(finalOpened)return;finalOpened=true;
    envWrap.removeEventListener('click',handleFinalClick);
    envWrap.removeEventListener('touchend',handleFinalClick);
    envWrap.style.cursor='default';
    document.getElementById('finalTapHint').style.display='none';

    soundSeal();

    // Open flap
    document.getElementById('openFlap').style.display='block';
    var cf=document.getElementById('closedFlap');
    cf.style.transition='opacity .6s ease';
    cf.style.opacity='0';
    setTimeout(function(){cf.style.display='none'},600);

    // Show card area, slide envelope away
    var cardArea=document.getElementById('finalCardArea');
    var card=document.getElementById('finalCard');
    var btns=document.getElementById('actionButtons');

    setTimeout(function(){
      cardArea.classList.add('show');
      card.classList.add('reveal');
    },600);

    setTimeout(function(){
      envWrap.classList.add('away');
    },1200);

    // Show buttons after card is revealed
    setTimeout(function(){
      btns.classList.add('show');
    },2800);
  }

  envWrap.addEventListener('click',handleFinalClick);
  envWrap.addEventListener('touchend',function(e){e.preventDefault();handleFinalClick(e)});
}

// ===== CALENDAR =====
function addToCalendar(){
  var ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Amanda&Gabriel//SaveTheDate//PT',
    'BEGIN:VEVENT',
    'DTSTART:20260912T100000',
    'DTEND:20260913T040000',
    'SUMMARY:Casamento Amanda & Gabriel ❤️',
    'LOCATION:Hortolândia, SP',
    'DESCRIPTION:Casamento de Amanda e Gabriel - Mais informações em breve!',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url)},1000);
}

// ===== DOWNLOAD CARD =====
function downloadCard(){
  var card=document.getElementById('stdCardCapture');
  if(typeof html2canvas!=='undefined'){
    card.classList.add('capturing');
    setTimeout(function(){
      html2canvas(card,{scale:3,useCORS:true,allowTaint:true,backgroundColor:'#FDFBF8'}).then(function(canvas){
        card.classList.remove('capturing');
        var a=document.createElement('a');
        a.href=canvas.toDataURL('image/png');
        a.download='save-the-date-amanda-gabriel.png';
        a.click();
      }).catch(function(){card.classList.remove('capturing')});
    },80);
  }else{
    alert('Não foi possível gerar a imagem. Tire um print da tela!');
  }
}

// ===== PLAY =====
async function play(){
  await sleep(400);document.getElementById('dateChip').classList.add('visible');await sleep(400);
  for(var i=0;i<script.length;i++){
    var m=script[i];
    if(m.type==='call'){await sleep(m.delay);await showCallScreen();await sleep(700);
      var l=createCallLog();chat.appendChild(l);
      requestAnimationFrame(function(){requestAnimationFrame(function(){l.classList.add('visible');scrollB()})});
      await sleep(900);continue}
    if(m.type==='savethedate'){await sleep(m.delay);showFinalReveal();continue}
    var tt=Math.min(m.delay||1400,2200);showTyping(m.from);await sleep(Math.max(600,tt*.65));hideTyping(m.from);
    var el=createMsg(m);chat.appendChild(el);
    if(m.from==='in')soundMsgIn();else soundMsgOut();
    requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('visible');scrollB()})});
    var nx=script[i+1];
    if(nx&&nx.from===m.from&&!nx.type)await sleep(Math.max(280,(m.delay||1e3)*.22));
    else await sleep(Math.max(400,(m.delay||1e3)*.35));
  }
}
</script>
